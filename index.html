<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceMirror</title>
<style>
body{font-family:Arial;background:#0b1220;color:#fff;text-align:center;padding:20px}
button{padding:12px 20px;margin:10px;border-radius:10px;border:none;background:#ff5a57;color:#fff;font-weight:bold}
</style>
</head>
<body>

<h1>VoiceMirror</h1>

<button onclick="start('personality')">Personalidad</button>
<button onclick="start('challenge')">Desafío</button>

<h2 id="phrase"></h2>

<script>
let lastUsed = []
let lastResult = null

const phrases = {
  personality:{
    seguridad:[
      "Confío plenamente en lo que digo",
      "Mi voz transmite seguridad absoluta",
      "No necesito convencer, ya lo soy"
    ],
    duda:[
      "No estoy seguro de esto",
      "Quizá no sea la mejor opción",
      "Tengo mis dudas ahora mismo"
    ],
    autoridad:[
      "Escúchame con atención",
      "Esto es lo que vamos a hacer",
      "No hay discusión posible"
    ],
    calma:[
      "Todo está bajo control",
      "Respira, no pasa nada",
      "Vamos paso a paso"
    ]
  },
  challenge:{
    energia:[
      "Grita esto como si ganaras un premio",
      "Exprésalo con máxima emoción",
      "Dilo como si fuera urgente"
    ],
    control:[
      "Dilo sin emoción",
      "Mantén la voz totalmente estable",
      "Control absoluto al hablar"
    ]
  }
}

function getCategory(){
  if(!lastResult) return randomKey(phrases.personality)
  if(lastResult==="Dominante") return "calma"
  if(lastResult==="Inseguro") return "seguridad"
  return randomKey(phrases.personality)
}

function randomKey(obj){
  const keys = Object.keys(obj)
  return keys[Math.floor(Math.random()*keys.length)]
}

function getPhrase(mode){
  let category = randomKey(phrases[mode])

  if(mode==="personality"){
    if(Math.random()<0.7){
      category = getCategory()
    }
  }

  let list = phrases[mode][category]
  let phrase = list[Math.floor(Math.random()*list.length)]

  let tries = 0
  while(lastUsed.includes(phrase) && tries<10){
    phrase = list[Math.floor(Math.random()*list.length)]
    tries++
  }

  lastUsed.push(phrase)
  if(lastUsed.length>10) lastUsed.shift()

  return phrase
}

function start(mode){
  const phrase = getPhrase(mode)
  document.getElementById("phrase").innerText = phrase
}
</script>

</body>
</html>
